name: Build ESP32-C3 Firmware

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          set -e
          curl -fsSL https://downloads.arduino.cc/arduino-cli/arduino-cli_latest_Linux_64bit.tar.gz -o arduino-cli.tar.gz
          tar -xzf arduino-cli.tar.gz
          sudo mv arduino-cli /usr/local/bin/
          arduino-cli version

      - name: Configure Arduino CLI (ESP32 + allow git installs)
        run: |
          set -e
          arduino-cli config init || true
          arduino-cli config set board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli config set library.enable_unsafe_install true
          arduino-cli config dump

      - name: Install ESP32 Core (LOCK)
        run: |
          set -e
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17
          arduino-cli core list

      - name: Install Libraries (Async + MPU6050)
        run: |
          set -e
          arduino-cli lib update-index

          # Async libs (GitHub)
          arduino-cli lib install --git-url https://github.com/me-no-dev/AsyncTCP.git
          arduino-cli lib install --git-url https://github.com/me-no-dev/ESPAsyncWebServer.git

          # Adafruit libs (Library Manager)
          arduino-cli lib install "Adafruit MPU6050"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "Adafruit BusIO"

          # Verify installed libs (new)
          arduino-cli lib list | grep -i "AsyncTCP" || true
          arduino-cli lib list | grep -i "ESPAsyncWebServer" || true
          arduino-cli lib list | grep -i "Adafruit MPU6050" || true
          arduino-cli lib list | grep -i "Adafruit Unified Sensor" || true
          arduino-cli lib list | grep -i "Adafruit BusIO" || true

      - name: Prepare Sketch
        run: |
          set -e
          mkdir -p sketch/drone
          cp drone/drone.ino sketch/drone/drone.ino
          ls -R sketch

      - name: Compile ESP32-C3
        run: |
          set -e
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c3 \
            --output-dir build \
            sketch/drone

          # Show produced files (new)
          ls -lah build

      - name: Upload BIN (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build
